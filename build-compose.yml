services:
  app:
    build: .
    userns_mode: "keep-id"
    user: "1000:1000"
    stop_grace_period: 30s
    init: true
    environment:
      CURSE_FORGE_API: ${CURSE_FORGE_API}
      MODS: |
        bettermap
        https://www.curseforge.com/hytale/mods/eyespyadmin-tools-reforged
    volumes:
      - ./data:/app/data:Z
      - ./mods:/app/mods:Z